# Deploy — runs only on push to master, AND only after CI succeeds.
# `workflow_run` triggers off the CI workflow's completion event so we
# never deploy a build whose tests failed.
#
# Scope: CDK (backend + infra) only. Amplify Hosting auto-deploys the
# frontend off its own GitHub trigger; calling `aws amplify start-job`
# from here would just double-deploy. If you ever disconnect Amplify
# from GitHub, add an "Amplify rebuild" step using AMPLIFY_APP_ID.

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

jobs:
  cdk-deploy:
    name: CDK deploy (backend + infrastructure)
    runs-on: ubuntu-latest
    # Only deploy when the CI run that triggered this actually passed.
    # workflow_run fires on success AND failure; the conclusion check
    # is what gates the deploy.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Check out the SHA that CI ran against, not the latest tip
          # of master — keeps the deployed artefact and the green CI
          # run pointing at the same commit.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      # Long-lived access keys are fine for now per the spec, but consider
      # migrating to OIDC federation (aws-actions/configure-aws-credentials
      # with role-to-assume) when convenient — short-lived tokens, no
      # secret rotation.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CDK deploy
        run: npx cdk deploy --require-approval never
        working-directory: infrastructure
